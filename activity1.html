<!DOCTYPE html>
<html>
<head>
  <title>Simple Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif; /* added sans-serif and semicolon */
      background: linear-gradient(to right, #74ebd5, #9face6); /* background color is gradient from left light green to right light purple */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background-color: #fff; /*#fff is the hexadecimal color code for white.*/
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(255, 0, 0, 0.8); /*red, green, blue, opacity.*/
      text-align: center;
      width: 320px; 
    }

    h2 {
      color: #0000ff; /*red, green, blue*/
      margin-bottom: 20px;
    }

    input[type="number"] {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    button {
      background-color: #3498db;
      color: #fff;
      padding: 10px 16px;
      margin: 8px 6px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #2c3e50;
    }

    h3 {
      color: #222;
      margin-top: 25px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">
           <h2>Simple Calculator</h2>


           <input type="number" id="num1" placeholder="Enter number 1">
           <input type="number" id="num2" placeholder="Enter number 2"><br>


           <button onclick="add()">Add</button>
            <button onclick="subtract()">Subtract</button>
            <button onclick="multiply()">Multiply</button>
            <button onclick="divide()">Divide</button>
    <h3 id="result"></h3>

 <h3 id="result"></h3>
  </div>

  <script>
    function add() {
      var num1 = parseFloat(document.getElementById("num1").value);
      var num2 = parseFloat(document.getElementById("num2").value);
      document.getElementById("result").innerText = "Result: " + (num1 + num2);
    }

    function subtract() {
      var num1 = parseFloat(document.getElementById("num1").value);
      var num2 = parseFloat(document.getElementById("num2").value);
      document.getElementById("result").innerText = "Result: " + (num1 - num2);
    }

    function multiply() {
      var num1 = parseFloat(document.getElementById("num1").value);
      var num2 = parseFloat(document.getElementById("num2").value);
      document.getElementById("result").innerText = "Result: " + (num1 * num2);
    }

    function divide() {
      var num1 = parseFloat(document.getElementById("num1").value);
      var num2 = parseFloat(document.getElementById("num2").value);
      let result = num2 === 0 ? "Cannot divide by zero" : (num1 / num2).toFixed(2);
      document.getElementById("result").innerText = "Result: " + result;
    }
  </script>
</body>
</html>
