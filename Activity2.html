<!DOCTYPE html>


<head>

  

    <title>MCJabi Order App</title>



    <style>

        body{

            font-family: Arial, sans-serif;

            background:#f5f5f5;

            padding:20px;

        }



        h1{

            text-align:center;

            color:#333;

        }



        .menu{

            display:flex;

            justify-content:center;

            align-items:flex-start;

            gap:30px;

            flex-wrap:wrap;

            margin-bottom:30px;

        }



        .item{

            width:220px;

            background:white;

            border:1px solid #ccc;

            border-radius:10px;

            padding:15px;

            text-align:center;

            box-shadow:0 4px 10px rgba(0,0,255,0.20);

        }



        .item img{

            width:120px;

            height:120px;

            object-fit:cover;

            margin-bottom:10px;

        }



        p{

            font-weight:bold;

        }



        input[type="number"]{

            width:60px;

            text-align:center;

        }



        .controls{

            text-align:center;

            margin-top:20px;

        }



        select{

            padding:5px;

        }



        button{

            margin-top:15px;

            padding:10px 20px;

            background:#007BFF;

            color:white;

            border:none;

            border-radius:5px;

            cursor:pointer;

            font-size:16px;

        }



        button:hover{

            background:#0056b3;

        }



        #totalPrice{

            margin-top:20px;

            font-size:18px;

            text-align:center;

            background:white;

            padding:15px;

            width:320px;

            margin-left:auto;

            margin-right:auto;

            border-radius:10px;

            box-shadow:0 4px 10px rgba(0,0,0,0.2);

        }

    </style>



</head>



<body>



<h1> MCJabi Order App </h1>



<div class="menu">



    <div class="item">

        <img src="https://assets.bonappetit.com/photos/5b919cb83d923e31d08fed17/1:1/w_640,c_limit/basically-burger-1.jpg" alt="Hamburger">

        <p>Hamburger - ₱100</p>



        Quantity:

        <input type="number" id="qty-hamburger" value="0" min="0">

    </div>



    <div class="item">

        <img src="https://www.allrecipes.com/thmb/edK6Y6elalHotRgLIiKzYFO0CHk=/750x0/filters:no_upscale():max_bytes(150000):strip_icc():format(webp)/19356-spaghetti-italian-VAT-Beauty-4x3-af05b7565e014c16b1c5f86d45a18738.jpg" alt="Spaghetti">

        <p>Spaghetti - ₱120</p>



        Quantity:

        <input type="number" id="qty-spaghetti" value="0" min="0">

    </div>



    <div class="item">

        <img src="https://www.tasteofhome.com/wp-content/uploads/2018/01/Crispy-Fried-Chicken_EXPS_TOHJJ22_6445_DR-_02_03_11b-14.jpg?fit=360%2C360" alt="Chicken">

        <p>Chicken - ₱150</p>



        Quantity:

        <input type="number" id="qty-chicken" value="0" min="0">

    </div>



</div>



<div class="controls">



    <label><strong>Discount:</strong></label>



    <select id="discount">

        <option value="0">None</option>

        <option value="0.25">Senior Citizen (25%)</option>

        <option value="0.20">Membership Card (20%)</option>

        <option value="0.15">Manager (15%)</option>

    </select>



    <br>



    <button onclick="calculateOrder()">Compute Total</button>



</div>



<p id="totalPrice">

    Discount: ₱0.00<br>

    <strong>SubTotal: ₱0.00</strong><br>

    <strong>Total Price: ₱0.00</strong>

</p>



<script>



function calculateOrder(){



    const prices = {

        hamburger:100,

        spaghetti:120,

        chicken:150

    };



    const qtyHamburger =

        parseInt(document.getElementById("qty-hamburger").value) || 0;



    const qtySpaghetti =

        parseInt(document.getElementById("qty-spaghetti").value) || 0;



    const qtyChicken =

        parseInt(document.getElementById("qty-chicken").value) || 0;



    const subtotal =

        (qtyHamburger * prices.hamburger) +

        (qtySpaghetti * prices.spaghetti) +

        (qtyChicken * prices.chicken);



    const discountRate =

        parseFloat(document.getElementById("discount").value);



    const discount =

        subtotal * discountRate;



    const total =

        subtotal - discount;



    document.getElementById("totalPrice").innerHTML = `

        Discount: ₱${discount.toFixed(2)}<br>

        <strong>SubTotal: ₱${subtotal.toFixed(2)}</strong><br>

        <strong>Total Price: ₱${total.toFixed(2)}</strong>

    `;

}



// Automatically update total

document.getElementById("qty-hamburger").addEventListener("input", calculateOrder);

document.getElementById("qty-spaghetti").addEventListener("input", calculateOrder);

document.getElementById("qty-chicken").addEventListener("input", calculateOrder);

document.getElementById("discount").addEventListener("change", calculateOrder);



// Display initial values

calculateOrder();



</script>



</body>

</html>
