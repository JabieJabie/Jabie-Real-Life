<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Expense Logger</title>
  <style>
    /* CSS Variables */
    :root {
      --primary-color: #27ae60;
      --primary-hover: #2ecc71;
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text-dark: #2c3e50;
      --text-muted: #7f8c8d;
      --border-color: #e0e0e0;
      --border-radius: 8px;
    }

    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Semantic Main Container */
    main.card {
      background-color: var(--card-bg);
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 450px;
    }

    header {
      margin-bottom: 25px;
      text-align: center;
    }

    header h2 {
      font-size: 1.8rem;
      font-weight: 700;
    }

    header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 5px;
    }

    /* CSS Grid Form */
    #expenseForm {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    label {
      margin-bottom: 6px;
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    input, select {
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      font-size: 1rem;
      background-color: #fafafa;
      transition: all 0.3s ease;
    }

    input:focus, select:focus {
      border-color: var(--primary-color);
      background-color: #fff;
      outline: none;
      box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.15);
    }

    button {
      grid-column: 1 / -1;
      padding: 14px;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: var(--border-radius);
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.2s ease;
    }

    button:hover:not(:disabled) {
      background-color: var(--primary-hover);
    }

    button:disabled {
      background-color: #95a5a6;
      cursor: not-allowed;
    }

    /* Result Feedback Styling */
    #feedbackCard {
      margin-top: 25px;
      padding: 15px;
      border-radius: var(--border-radius);
      text-align: center;
      font-weight: 600;
      color: #fff;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .hidden {
      display: none;
      opacity: 0;
      transform: translateY(-10px);
    }

    /* Media Query for Mobile */
    @media (max-width: 500px) {
      #expenseForm {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <main class="card">
    <header>
      <h2>Log an Expense</h2>
      <p>Keep track of your daily spending.</p>
    </header>
    
    <section>
      <form id="expenseForm"> 
        <div class="form-group full-width">
          <label for="item">What did you buy?</label> 
          <input type="text" id="item" placeholder="e.g. Food" required> 
        </div>
        
        <div class="form-group">
          <label for="amount">Amount (P)</label> 
          <input type="number" id="amount" min="0.01" step="0.01" placeholder="50" required> 
        </div>
        
        <div class="form-group">
          <label for="date">Date</label> 
          <input type="date" id="date" required> 
        </div>

        <div class="form-group full-width">
          <label for="category">Category</label> 
          <select id="category" required> 
            <option value="">Select a category</option> 
            <option value="Food & Dining">Food & Dining</option> 
            <option value="Transportation">Transportation</option> 
            <option value="Utilities">Utilities</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>
          </select> 
        </div>
        
        <button type="submit">Save Expense</button> 
      </form> 
    </section>
    
    <section id="feedbackCard" class="hidden" aria-live="polite"></section> 
  </main>

  <script>
    document.getElementById('date').valueAsDate = new Date();

    document.getElementById('expenseForm').addEventListener('submit', function(e) { 
      e.preventDefault(); 
      
      const item = document.getElementById('item').value.trim(); 
      const amount = parseFloat(document.getElementById('amount').value).toFixed(2); 
      const date = document.getElementById('date').value; 
      const category = document.getElementById('category').value; 
 
      const categoryColors = {
        "Food & Dining": "#E67E22",
        "Transportation": "#3498DB",
        "Utilities": "#9B59B6",
        "Entertainment": "#F1C40F",
        "Other": "#34495E"
      };

      const color = categoryColors[category] || "#2ecc71";

      const expenseData = { item, amount, date, category };
      
      showFeedback(`Saved! $${amount} logged for ${item}.`, color); 
      recordExpense(expenseData); 
    });

    function showFeedback(message, color) {
      const feedbackCard = document.getElementById('feedbackCard');
      
      feedbackCard.classList.remove('hidden');
      setTimeout(() => {
        feedbackCard.style.opacity = '1';
        feedbackCard.style.transform = 'translateY(0)';
      }, 10);
      
      feedbackCard.style.backgroundColor = color; 
      feedbackCard.innerHTML = `<p>${message}</p>`;
      setTimeout(() => {
        feedbackCard.style.opacity = '0';
        setTimeout(() => feedbackCard.classList.add('hidden'), 300);
      }, 4000);
    }

    function recordExpense(data) {
      const scriptUrl = 'https://script.google.com/macros/s/AKfycbzU1wNW4nPeEKK7isLOFgOzvn8Ljq_-VfBX9f089RwJdC-atHvTOF3yWsB9f89Yp1YtNw/exec'; 
      
      const submitBtn = document.querySelector('button[type="submit"]');
      const form = document.getElementById('expenseForm');
      
      submitBtn.innerText = 'Saving...';
      submitBtn.disabled = true;

      fetch(scriptUrl, {
        method: 'POST',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(data)
      })
      .then(response => response.json())
      .then(result => {
        console.log('Successfully saved to Google Sheets');
        form.reset(); // Clear the form
        document.getElementById('date').valueAsDate = new Date(); // Reset date to today
      })
      .catch(error => console.error('Error saving data:', error))
      .finally(() => {
        submitBtn.innerText = 'Save Expense';
        submitBtn.disabled = false;
      });
    }
  </script>
</body>
</html>
